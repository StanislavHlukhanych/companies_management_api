services:
    php:
        build: .
        volumes:
            - .:/var/www/html
        environment:
            DATABASE_URL: "mysql://root:1111@database:3306/symfony_test_task"

    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    database:
        image: mysql:8.0.32
        environment:
            MYSQL_ROOT_PASSWORD: 1111
            MYSQL_DATABASE: symfony_test_task
        ports:
            - "3306:3306"
        volumes:
            - database_data:/var/lib/mysql:rw

volumes:
    database_data:
